<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat/Dog Classifier</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-paw"></i>
            <h1>Cat/Dog Classifier</h1>
            <p>Upload an image to find out if it's a cat or a dog!</p>
        </div>
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <label for="imageInput" class="upload-btn">
                <i class="fas fa-cloud-upload-alt"></i>
                Choose Image
            </label>
        </div>
        <div class="preview-section">
            <img id="imagePreview" src="" alt="Image Preview" class="fade-in">
        </div>
        <div class="loading-section" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing your image...</p>
        </div>
        <div class="results-section fade-in" id="results" style="display: block;">
            <h2><i class="fas fa-chart-line"></i> Prediction Results</h2>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                    <h3>Prediction</h3>
                    <div id="predictionIcon">📷</div>
                    <div id="predictionText">Upload an image</div>
                </div>
                <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                    <h3>Probability</h3>
                    <div id="percentageText">0.00</div>
                    <div class="label-cat">Cat</div>
                    <div class="label-dog">Dog</div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
